<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Department</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fb;
            margin: 0;
            padding: 30px;
        }

        .form-container {
            max-width: 750px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        h1 {
            color: #1e3a8a;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }

        select {
            min-height: 180px;
        }

        .btn {
            padding: 12px 18px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-save {
            background: #f59e0b;
            color: white;
        }

        .btn-back {
            background: #6b7280;
            color: white;
            margin-left: 10px;
        }

        .message {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Edit Department</h1>

        {% if messages %}
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Department Name</label>
            <input type="text" name="name" value="{{ department.name }}" required>

            <label>Description</label>
            <textarea name="description" rows="4">{{ department.description }}</textarea>

            <label>Assign Teachers</label>
            <select name="teachers" multiple>
                {% for teacher in teachers %}
                    <option value="{{ teacher.id }}" {% if teacher.id in selected_teacher_ids %}selected{% endif %}>
                        {{ teacher.first_name }} {{ teacher.last_name }}
                    </option>
                {% endfor %}
            </select>

            <button type="submit" class="btn btn-save">Save Changes</button>
            <a href="{% url 'department_list' %}" class="btn btn-back">Back</a>
        </form>
    </div>
</body>
</html>
