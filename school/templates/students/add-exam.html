{% if request.user.is_authenticated and request.user.is_admin or request.user.is_teacher %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Exam</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fb;
            margin: 0;
            padding: 30px;
        }

        .form-container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        h1 {
            color: #1e3a8a;
            margin-bottom: 20px;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 8px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn-save {
            background: #2563eb;
            color: white;
        }

        .btn-back {
            background: #6b7280;
            color: white;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Add Exam</h1>

        <form method="POST">
            {% csrf_token %}

            <label>Exam Title</label>
            <input type="text" name="title" required>

            <label>Class</label>
            <input type="text" name="student_class" required>

            <label>Subject</label>
            <input type="text" name="subject" required>

            <label>Exam Date</label>
            <input type="date" name="exam_date" required>

            <div class="buttons">
                <button type="submit" class="btn btn-save">Add Exam</button>
                <a href="{% url 'exam_list' %}" class="btn btn-back">Back</a>
            </div>
        </form>
    </div>
</body>
</html>
{% else %}
    <h2 style="text-align: center; margin-top: 50px; color: #6b7280;">You do not have permission to access this page.</h2>
{% endif %}
