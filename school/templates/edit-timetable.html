<!DOCTYPE html>
<html>
<head>
    <title>Edit Timetable</title>
</head>
<body>
    <h1>Edit Timetable</h1>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="student_class" value="{{ timetable.student_class }}" required><br><br>
        <input type="text" name="section" value="{{ timetable.section }}" required><br><br>
        <input type="text" name="subject" value="{{ timetable.subject }}" required><br><br>
        <input type="text" name="teacher" value="{{ timetable.teacher }}" required><br><br>

        <select name="day" required>
            <option value="Monday" {% if timetable.day == 'Monday' %}selected{% endif %}>Monday</option>
            <option value="Tuesday" {% if timetable.day == 'Tuesday' %}selected{% endif %}>Tuesday</option>
            <option value="Wednesday" {% if timetable.day == 'Wednesday' %}selected{% endif %}>Wednesday</option>
            <option value="Thursday" {% if timetable.day == 'Thursday' %}selected{% endif %}>Thursday</option>
            <option value="Friday" {% if timetable.day == 'Friday' %}selected{% endif %}>Friday</option>
            <option value="Saturday" {% if timetable.day == 'Saturday' %}selected{% endif %}>Saturday</option>
        </select><br><br>

        <label>Start time</label><br>
        <input type="time" name="start_time" value="{{ timetable.start_time|time:'H:i' }}" required><br><br>

        <label>End time</label><br>
        <input type="time" name="end_time" value="{{ timetable.end_time|time:'H:i' }}" required><br><br>

        <button type="submit">Save</button>
    </form>

    <br>
    <a href="{% url 'timetable_list' %}">Back to timetable</a>
</body>
</html>
