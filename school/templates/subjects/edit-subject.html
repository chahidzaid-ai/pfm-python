{% extends 'Home/base.html' %}
{% load static %}
{% block body %}
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f4f7fb; margin: 0; padding: 30px; }
        .form-container {
            max-width: 750px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        h1 { color: #1e3a8a; margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
        .btn {
            padding: 12px 18px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-save { background: #f59e0b; color: white; }
        .btn-back { background: #6b7280; color: white; margin-left: 10px; }
        .message {
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Edit Subject</h1>

        {% if messages %}
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Subject Name</label>
            <input type="text" name="name" value="{{ subject.name }}" required>

            <label>Subject Code</label>
            <input type="text" name="code" value="{{ subject.code }}" required>

            <label>Department</label>
            <select name="department" required>
                {% for department in departments %}
                    <option value="{{ department.id }}" {% if subject.department.id == department.id %}selected{% endif %}>
                        {{ department.name }}
                    </option>
                {% endfor %}
            </select>

            <label>Teacher</label>
            <select name="teacher" required>
                {% for teacher in teachers %}
                    <option value="{{ teacher.id }}" {% if subject.teacher.id == teacher.id %}selected{% endif %}>
                        {{ teacher.first_name }} {{ teacher.last_name }}
                    </option>
                {% endfor %}
            </select>

            <button type="submit" class="btn btn-save">Save Changes</button>
            <a href="{% url 'subject_list' %}" class="btn btn-back">Back</a>
        </form>
    </div>
<script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>
<script src="{% static 'assets/js/popper.min.js' %}"></script>
<script src="{% static 'assets/plugins/bootstrap/js/bootstrap.min.js' %}"></script>
<script src="{% static 'assets/plugins/slimscroll/jquery.slimscroll.min.js' %}"></script>
<script src="{% static 'assets/js/script.js' %}"></script>

{% endblock %}
